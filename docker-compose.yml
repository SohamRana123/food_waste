version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Canonical SQLite path (used by backend/config.py). Mounted volume below.
      SQLITE_DB_FILE: /app/data/kitchen_ops.sqlite
      API_PORT: 8000
      API_HOST: 0.0.0.0
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - kitchen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        # Server-side rewrites: Next container reaches API by service name
        BACKEND_URL_FOR_REWRITE: http://backend:8000
        # Browser uses same-origin proxy so LAN/mobile clients work with :3000 only
        NEXT_PUBLIC_API_BASE_URL: same-origin
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kitchen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  kitchen-network:
    driver: bridge
